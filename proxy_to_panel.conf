  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-Proto https;
  add_header X-Robots-Tag "noindex, nofollow";

  # Russian translation filters for common UI strings
  proxy_set_header Accept-Encoding "";
  sub_filter_once off;
  sub_filter '"Welcome"' '"Добро пожаловать"' i;
  sub_filter '"Choose your preferred language"' '"Выберите предпочитаемый язык"' i;
  sub_filter '"Remaining Traffic"' '"Оставшийский трафик"' i;
  sub_filter '"Remaining Time"' '"Оставшееся время"' i;
  sub_filter '"Support"' '"Поддержка"' i;
  sub_filter '"View More"' '"Показать больше"' i;
  sub_filter '"Home"' '"Главная"' i;
  sub_filter '"Devices"' '"Устройства"' i;
  sub_filter '"Settings"' '"Параметры"' i;
  sub_filter '"Dashboard"' '"Панель управления"' i;
  sub_filter '"Days"' '"Дни"' i;
  sub_filter '"Hours"' '"Часы"' i;
  sub_filter '"Minutes"' '"Минуты"' i;
  sub_filter '"Total"' '"Всего"' i;
  sub_filter '"Used"' '"Использовано"' i;
  sub_filter '"Remaining"' '"Осталось"' i;

  proxy_pass http://localhost:9000;
